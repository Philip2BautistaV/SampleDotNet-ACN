# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  branches:
    include:
      - Develop
      - release/*
      - main

pool:
  vmImage: windows-latest

variables:
  buildConfiguration: 'Release'
  azureServiceConnection: '45138fee-3b39-4bda-bba3-d5461fad16ab'
  WebAppKind: 'webApp'
  WebAppName1: 'Staging101'

stages:

# ====================================
# STAGE 1: BUILD (FROM CI YAML)
# ====================================
- stage: Build
  displayName: 'Build and Test'
  jobs:
    - job: BuildJob
      steps:

        - task: UseDotNet@2
          displayName: 'Install .NET 9 SDK'
          inputs:
            packageType: 'sdk'
            version: '9.0.x'

        - script: dotnet --info
          displayName: 'Display .NET Info'

        - task: DotNetCoreCLI@2
          displayName: 'Restore'
          inputs:
            command: 'restore'
            projects: 'LGWebApp.csproj'

        - task: DotNetCoreCLI@2
          displayName: 'Build'
          inputs:
            command: 'build'
            projects: 'LGWebApp.csproj'
            arguments: '--configuration $(buildConfiguration) --no-restore'

        - script: dotnet format --verify-no-changes
          displayName: 'Lint'

        - task: DotNetCoreCLI@2
          displayName: 'Unit Tests'
          inputs:
            command: test
            projects: '**/*Tests.csproj'
            arguments: '--configuration Release --no-build'

        - task: DotNetCoreCLI@2
          displayName: 'Integration Tests'
          inputs:
            command: test
            projects: '**/*IntegrationTests.csproj'
            arguments: '--configuration Release --no-build'

        - script: |
            dotnet tool install --global Microsoft.CST.DevSkim.CLI
            devskim analyze --source-code $(Build.SourcesDirectory)
          displayName: 'Security Scan'

        - task: DotNetCoreCLI@2
          displayName: 'Publish'
          inputs:
            command: 'publish'
            projects: 'LGWebApp.csproj'
            publishWebProjects: false
            arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'

        - publish: $(Build.ArtifactStagingDirectory)
          artifact: drop


# ====================================
# STAGE 2: STAGING (FROM CD YAML)
# ====================================
- stage: Staging
  displayName: 'Deploy to Development Environment'
  dependsOn: Build
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/Develop')

  jobs:
    - deployment: Deploy_Staging
      environment: 'DBG-Training'
      strategy:
        runOnce:
          deploy:
            steps:
              - download: current
                artifact: drop



