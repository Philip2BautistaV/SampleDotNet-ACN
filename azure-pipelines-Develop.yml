# =========================
# Continuous Deployment YAML
# =========================

trigger: none   # No code trigger

resources:
  pipelines:
    - pipeline: ciPipeline
      source: 'Philip2BautistaV.SampleDotNet-ACN'   # Name of your CI pipeline (azure-pipelines.yml)
      trigger:
        branches:
          include:
            - main

variables:
  ConnectedServiceName: 'a4705bae-6684-47b6-bfa9-1c21f9f43607'   # from your screenshot
  WebAppKind: 'webApp'
  WebAppName: 'Staging101'

stages:

# =========================
# STAGING DEPLOYMENT
# =========================
- stage: Staging
  displayName: "Deploy to Staging"

  jobs:
    - deployment: DeployWebApp
      displayName: "Deploy Azure App Service"
      environment: "Staging101"   # must exist in Azure DevOps

      strategy:
        runOnce:
          deploy:
            steps:
              # Download artifact from CI
              - download: ciPipeline
                artifact: drop

              # Deploy to Azure App Service
              - task: AzureWebApp@1
                displayName: "Deploy Web App"
                inputs:
                  azureSubscription: $(ConnectedServiceName)
                  appType: webApp
                  appName: $(WebAppName)
                  package: $(Pipeline.Workspace)/ciPipeline/drop
``
