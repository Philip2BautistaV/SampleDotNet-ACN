trigger: none
pr: none

resources:
  pipelines:
    - pipeline: ciPipeline
      source: Philip2BautistaV.SampleDotNet-ACN   # ✅ REPLACE with your actual CI pipeline name
      trigger: true

pool:
  vmImage: windows-latest

stages:

# ===============================
# DEPLOY TO DEVELOPMENT
# ===============================
- stage: Deploy_Dev
  displayName: "Deploy to Development Environment"

  jobs:
    - deployment: DeployToDev
      displayName: "Deploy Azure App Service"

      # ✅ Enables approval (configure in ADO UI)
      environment: "Staging101"

      strategy:
        runOnce:
          deploy:
            steps:

              # ✅ Download artifact from CI
              - download: ciPipeline
                artifact: drop

              # ✅ (Recommended) verify artifact path
              - script: |
                  echo "Listing files:"
                  dir $(Pipeline.Workspace)
                displayName: "Verify Artifact"

              # ✅ Your requested deployment task
              - task: AzureRmWebAppDeployment@4
                displayName: 'Deploy Azure App Service'
                inputs:
                  azureSubscription: 'Azure subscription 1'
                  appType: 'Web App'
                  WebAppName: 'Staging101'
                  packageForLinux: '$(Pipeline.Workspace)/ciPipeline/drop/s.zip'
