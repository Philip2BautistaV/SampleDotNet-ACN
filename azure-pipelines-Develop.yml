# =========================
# Continuous Deployment YAML
# =========================

trigger: none   # CD should not trigger on code commits

resources:
  pipelines:
    - pipeline: ciPipeline
      source: Philip2BautistaV.SampleDotNet-ACN   # name of your CI pipeline (azure-pipelines.yml)
      trigger:
        branches:
          include:
            - main

variables:
  ConnectedServiceName: '45138fee-3b39-4bda-bba3-d5461fad16ab'
  WebAppKind: 'webApp'
  WebAppName: 'Staging101'

stages:

# =========================
# STAGING DEPLOYMENT
# =========================
- stage: Staging
  displayName: "Deploy to Staging"
  jobs:
    - deployment: DeployWebApp
      displayName: "Deploy to Azure Web App (Staging)"
      environment: "Staging101"
      strategy:
        runOnce:
          deploy:
            steps:
              - download: ciPipeline
                artifact: drop

              - task: AzureWebApp@1
                displayName: "Deploy Web App"
                inputs:
                  azureSubscription: $(ConnectedServiceName)
                  appType: $(WebAppKind)
                  appName: $(WebAppName)
                  package: $(Pipeline.Workspace)/ciPipeline/drop/**/*.zip
