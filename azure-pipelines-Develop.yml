
trigger: none

pr: none

resources:
  pipelines:
    - pipeline: ciPipeline   # alias
      source: Philip2BautistaV.SampleDotNet-ACN   # 👈 your CI pipeline name
      trigger:
        branches:
          include:
            - Develop   # ✅ only trigger when CI runs on develop

pool:
  vmImage: windows-latest


stages:

# ===============================
# STAGE 1 - DOWNLOAD ARTIFACT
# ===============================
- stage: Deploy_Dev
  displayName: "Deploy to Development"
  jobs:

    - deployment: DeployToDevelopment
      displayName: "Deploy to Development Environment"

      # ✅ This enables approval (configure in ADO UI)
      environment: "Development"

      strategy:
        runOnce:
          deploy:
            steps:

              # ✅ Download artifact from CI
              - download: current
                artifact: drop

              # ✅ Verify artifact (optional but useful)
              - script: |
                  echo "Listing downloaded artifact:"
                  dir $(Pipeline.Workspace)/drop
                displayName: "Verify Artifact"

              # ✅ Deployment step (replace with real deploy)
              - script: |
                  echo "Deploying application to Development environment..."
                  echo "Artifact path: $(Pipeline.Workspace)/drop"
                displayName: "Deploy Application"
