trigger:
  branches:
    include:
      - feature/*
      - Develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

stages:

# =========================
# 1. BUILD STAGE (CI)
# =========================
- stage: Build
  displayName: 'Build & Test'
  jobs:
    - job: BuildJob
      steps:

        - checkout: self
          persistCredentials: true   # Needed for git push later

        - task: UseDotNet@2
          displayName: 'Install .NET SDK'
          inputs:
            packageType: 'sdk'
            version: '9.0.x'

        - script: dotnet restore
          displayName: 'Restore'

        - script: dotnet build --configuration $(buildConfiguration)
          displayName: 'Build'

        - script: dotnet test --configuration $(buildConfiguration) --no-build
          displayName: 'Run Tests'

        - script: dotnet publish -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)
          displayName: 'Publish'

        - task: PublishBuildArtifacts@1
          displayName: 'Publish Artifact'
          inputs:
            PathtoPublish: '$(Build.ArtifactStagingDirectory)'
            ArtifactName: 'drop'


# =========================
# 2. MERGE TO DEVELOP
# =========================
- stage: MergeToDevelop
  displayName: 'Merge to Develop'
  dependsOn: Build
  condition: succeeded()

  jobs:
    - job: Merge
      steps:
        - checkout: self
          persistCredentials: true

        - script: |
            git config user.email "buildagent@dev.azure.com"
            git config user.name "Build Agent"

            git fetch origin

            # Checkout develop
            git checkout Develop
            git pull origin Develop

            # Merge source branch into develop
            git merge origin/$(Build.SourceBranchName) --no-ff -m "Auto-merge from CI pipeline"

            # Push changes
            git push origin Develop
          displayName: 'Merge to Develop'


# =========================
# 3. DEPLOY TO DEVELOPMENT
# =========================
- stage: Deploy_Dev
  displayName: 'Deploy to Development'
  dependsOn: MergeToDevelop
  condition: succeeded()

  jobs:
    - deployment: DeployDev
      displayName: 'Deploy to Dev Environment'
      environment: 'Development'

      strategy:
        runOnce:
          deploy:
            steps:

              - download: current
                artifact: drop

              - script: |
                  echo "Deploying to Development environment..."
                  echo "Artifact path: $(Pipeline.Workspace)/drop"
                displayName: 'Deploy Step'

              # Replace with your real deployment task:
              # - task: AzureWebApp@1 / AzureFunctionApp@1 / etc.
